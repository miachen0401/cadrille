# Cadrille SFT — phase-2 mix, FROM SCRATCH (replaces killed v1 run at step 4000).
#
# v1 run was killed at step 4000 because Fusion360 IoU was trailing curriculum
# by 14-17 IoU points at step 2000-3000. User decision (2026-04-27): refetch
# updated cad-recode-bench (~140k items on HF), drop the bench-heavy mix, and
# start fresh with a recode-heavy mix targeting 50% high-quality exposure.
#
# Goal (per user 2026-04-27):
#   - 40-60% of every step's draws come from text2cad_bench + recode_bench
#   - equal per-item frequency within (text2cad_bench, recode_bench)
#   - equal per-item frequency within (benchcad, cad_iso_106, benchcad_simple)
#
# Design (verified item counts after refetch on 2026-04-27):
#
#   item counts:                 weight (item_count × scale):
#     benchcad        18,167     →  18    (k_B=1.0)
#     cad_iso_106    162,145     → 162    (k_B=1.0)
#     benchcad_simple 85,597     →  86    (k_B=1.0)
#     text2cad_bench  76,238     →  94    (k_A=1.231)
#     recode_bench   142,411     → 175    (k_A=1.231)   ← refetched, was 94,894
#
# Per-source step share (total weight = 535):
#     benchcad         3.4%
#     cad_iso_106     30.3%
#     benchcad_simple 16.1%
#     text2cad_bench  17.6%
#     recode_bench    32.7%
#   → high-quality (text2cad+recode) = 50.3%
#
# Per-item exposure (×1e-3) — equal within each group:
#     bench-stack:  0.99–1.01
#     high-quality: 1.23

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

# Schedule — 50k total, resume from step 10000 (40k remaining steps)
max_steps: 50000
batch_size: 8
accumulation_steps: 4             # eff batch = 32
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 2000
eval_steps: 1000
online_eval_n_per: 20
max_iou_k: 8
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: true
resume_from_checkpoint: null  # FROM SCRATCH (v1 run discarded at step 4000)

seed: 42
max_code_len: 1000

# NEW phase-2 mix (vs phase-1 4:4:3:2:1)
# 50/50 high-quality (text2cad+recode) vs bench-stack, equal per-item within each group.
sft_mix_weights:
  benchcad:         18
  cad_iso_106:      162
  benchcad_simple:  86
  text2cad_bench:   94
  recode_bench:     175

curriculum_phases: null

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-50pct-recode-50k
hf_upload_private: false

wandb_project: cadrille-sft
