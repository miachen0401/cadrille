# Cadrille RL fine-tuning (Dr. CPPO / GRPO, matches official rl branch)
# Usage: python rl/train.py --config configs/rl/default.yaml
# Run name is auto-generated: rl-s50k-lr3e-5-G16-cppo-MMDD-HHMM
# Override: python rl/train.py --config configs/rl/default.yaml --run-name my-run
#
# Official hyperparameters from col14m/cadrille (rl branch):
#   G=16, top_N=4, lr=3e-5, eps=0.1, batch_updates=3, max_new_tokens=1024

# run_name: null   # leave unset for auto-naming
checkpoints_dir: ./checkpoints

# Mode: cppo (Dr. CPPO / GRPO) or dpo
mode: cppo

# SFT checkpoint to start from (point to your best SFT checkpoint)
checkpoint_path: ./checkpoints/cadrille-sft/checkpoint-best

# Data — real GT meshes (matches official deepcad_fusion_train)
data_dir: ./data/deepcad_test_mesh
hard_examples_pkl: null  # legacy: from rl/mine.py
dpo_dataset: null        # for --mode dpo

# Training
max_steps: 50000
lr: 3.0e-5               # AdamW, matches official

# Dr. CPPO / GRPO hyperparameters
G: 16                    # rollout completions per prompt
top_N: 4                 # select top-N by |advantage| for gradient update
eps_high: 0.1            # PPO clip upper bound
eps_low: 0.1             # PPO clip lower bound
batch_updates: 3         # gradient steps per rollout (re-use same data)
max_new_tokens: 1024     # official=400; set to 1024 for complete code generation
reward_workers: 4        # parallel reward compute workers

# DPO (only used with --mode dpo)
beta: 0.3                # KL coefficient (official Table 13)
dpo_epochs_per_round: 10

# Validation — 100 DeepCAD + 100 Fusion360, pc + img (matches paper eval exactly)
val_deepcad_dir:       ./data/deepcad_test_mesh
val_fusion360_dir:     ./data/fusion360_test_mesh
val_samples_deepcad:   100
val_samples_fusion360: 100
val_modalities:        pc,img
eval_steps: 500

# Logging & checkpoints
log_steps: 100
save_steps: 5000

# W&B
wandb_project: cadrille-rl
wandb_entity: null
wandb_offline: false
