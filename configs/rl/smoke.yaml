# RL smoke test — 10 steps, tiny data, no real validation
# Designed for fast CI/CD testing (< 5 min including model load).
#
# Usage:
#   python rl/train.py --config configs/rl/smoke.yaml --run-name smoke-test

checkpoints_dir: ./checkpoints

mode: cppo
checkpoint_path: ./checkpoints/cadrille-sft

# Data — mini dataset (100 meshes)
data_dir: ./data/deepcad_test_mini
hard_examples_pkl: null
dpo_dataset: null

# Training — 10 steps only
max_steps: 10
lr: 3.0e-5

# CPPO — minimal G for speed
G: 2
top_N: 1
eps_high: 0.1
eps_low: 0.1
batch_updates: 1
max_new_tokens: 64           # short for smoke test
reward_workers: 2
sequential_generation: true

# DPO (unused)
beta: 0.3
dpo_epochs_per_round: 10

# Validation — 5 samples, pc only
val_deepcad_dir:       ./data/deepcad_test_mini
val_fusion360_dir:     null
val_samples_deepcad:   5
val_samples_fusion360: 0
val_modalities:        pc
eval_steps: 999999           # disable mid-training eval for smoke test

# Logging
log_steps: 1
save_steps: 999999           # no checkpoint saves during smoke test

# W&B
wandb_project: cadrille-rl
wandb_entity: null
wandb_offline: true          # always offline for smoke test
