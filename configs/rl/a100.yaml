# Cadrille RL fine-tuning — single A100 40 GB (Colab Pro)
#
# Memory breakdown (~30 GB):
#   Model weights (bf16):      ~4.5 GB
#   AdamW fp32 optimizer:      ~9.0 GB
#   Activations (G=8 batch):   ~15 GB
#
# Throughput vs H100:
#   H100: G=16, batch_updates=3 → ~8-12 steps/min → 50k steps in ~3-4 days
#   A100: G=8,  batch_updates=3 → ~5-8  steps/min → 50k steps in ~5-7 days
#
# Usage: python rl/train.py --config configs/rl/a100.yaml

checkpoints_dir: ./checkpoints

mode: cppo
checkpoint_path: ./checkpoints/cadrille-sft

# Data — full-scan hard-mined examples (22,970 examples at R_th=0.75, K=1 img mode)
train_modality: img      # paper default: image input for RL
data_dir: null
hard_examples_pkl: ./data/mined/combined_hard.pkl
dpo_dataset: null

# Training
max_steps: 50000
lr: 1.0e-5                    # scaled for hard_examples_pkl batch (same as 4080/h100)

# Dr. CPPO — reduced G=8 to fit 40 GB; other settings match official paper
G: 8
top_N: 4
eps_high: 0.1
eps_low: 0.1
entropy_coef: 0.01       # entropy bonus coefficient (loss -= entropy_coef * entropy); counters lazy-code collapse
batch_updates: 3
max_new_tokens: 1024
rollout_temperature: 0.3    # sampling temp; chosen by temp sweep (best pass@4 on SFT)
reward_workers: 8
eval_workers: 2           # Fix 5: pool workers for eval (separate from reward_workers)
eval_timeout: 120.0        # Fix 1: long timeout for eval subprocess (vs 30s for training)
sequential_generation: false  # G=8 batched fits in 40 GB; set true if OOM

# DPO (unused)
beta: 0.3
dpo_epochs_per_round: 10

# Validation — 50 DeepCAD + 50 Fusion360, pc only (~5 min per eval pass)
val_deepcad_dir:       ./data/deepcad_test_mesh
val_fusion360_dir:     ./data/fusion360_test_mesh
val_samples_deepcad:   50
val_samples_fusion360: 50
val_modalities:        pc,img
eval_steps: 500

# Logging & checkpoints
log_steps: 10      # ~3-10 min between W&B updates at actual A100 throughput
save_steps: 500    # save frequently — Colab A100 sessions can timeout after ~12h
save_total_limit: 3

# HuggingFace checkpoint upload (async background thread after each save)
# Set to your model repo, e.g. "hula-the-cat/cadrille-rl"
# Requires HF_TOKEN env var or huggingface-cli login
hf_upload_repo: Hula0401/cad_ckpt

# W&B
wandb_project: cadrille-rl
wandb_entity: null
wandb_offline: false
