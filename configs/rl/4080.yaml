# Cadrille RL fine-tuning — single RTX 4080 SUPER (16 GB)
# Sequential generation (1 rollout at a time) to keep VRAM flat.
#
# Memory breakdown (~15.4 GB peak with freeze_vision_encoder=true):
#   Full model on GPU (bf16):      ~4.8 GB  (VE frozen, LM trainable)
#   LM gradients only (bf16):      ~3.5 GB  (VE has no grads)
#   AdamW m+v for LM only (bf16):  ~7.1 GB  (3.55 GB each)
#   Activations + misc:            ~0.5 GB
#   Total peak at optimizer.step: ~15.4 GB  (fits in 16 GB)
#
# Without freeze: model(4.8)+grads(4.8)+m(4.8)+v(4.8)=19.2 GB → OOM.
#
# G=4 with sequential_generation: ~40 s/step (4 × ~10 s) → 50k steps ≈ 23 days.
# Consider Colab A100 (a100.yaml) or H100 (h100.yaml) for full runs.
#
# Usage: python rl/train.py --config configs/rl/4080.yaml

# run_name: null   # leave unset for auto-naming
checkpoints_dir: ./checkpoints

mode: cppo
checkpoint_path: ./checkpoints/cadrille-sft

# Data — hard-mined examples (22,970 DeepCAD + Fusion360, R_th=0.75)
# Download via scripts/setup.sh --data
data_dir: null
train_modality: img
hard_examples_pkl: ./data/mined/combined_hard.pkl
dpo_dataset: null

# Training
max_steps: 50000
lr: 2.0e-7              # reduced from 3e-5: G=4 has high gradient variance vs official G=16
                        # lr=3e-5 caused KL divergence (ratio=2.42) at step 300 → collapse

# CPPO hyperparameters — memory-safe for 16 GB (official: G=16, top_N=4, batch_updates=3)
batch_size: 1            # 1 prompt per step; memory ceiling on 16 GB
G: 4                     # reduced from 16; sequential_generation keeps VRAM flat
top_N: 2                 # select top-2 of 4 by |advantage|
eps_high: 0.1
eps_low: 0.1
entropy_coef: 0.01       # entropy bonus coefficient (loss -= entropy_coef * entropy); counters lazy-code collapse
batch_updates: 3         # official=3; OK here — gradient pass is only top_N=2 samples
max_new_tokens: 1024     # official=400; 1024 needed for complete CadQuery scripts
rollout_temperature: 1.0    # sampling temp for G rollouts; chosen by temp sweep (best pass@4)
reward_normalization: false  # true: A=(R-μ)/(σ+eps) per prompt (eps=reward_norm_eps, default 0.01); false: A=R-μ (GRPO default)
debug_rollout_steps: 3      # print per-rollout codes+rewards, greedy comparison, and k=0/k=final entropy for first N steps (0=off)
reward_workers: 4
eval_batch_size: 8
eval_workers: 2           # Fix 5: pool workers for eval (separate from reward_workers)
eval_timeout: 120.0        # Fix 1: long timeout for eval subprocess (vs 30s for training)
sequential_generation: true  # batched fits but is slower at 97% VRAM; H100 uses false
freeze_vision_encoder: true  # freeze VE to fit in 16 GB (LM only = 1.77B trainable params)


# Validation — 25 DeepCAD + 25 Fusion360, both pc and img modalities.
# Validation runs on CPU-offloaded old model (not in memory) + single forward
# pass at a time → ~5-6 GB peak, well within 16 GB budget.
# img modality is cheap during val (no rollout expansion, no grad).
val_deepcad_dir:       ./data/deepcad_test_mesh
val_fusion360_dir:     ./data/fusion360_test_mesh
val_samples_deepcad:   50
val_samples_fusion360: 50
val_modalities:        pc,img
eval_steps: 50

# Logging & checkpoints
# save_total_limit: keep only the N most-recent checkpoints to cap disk usage.
# Each Cadrille checkpoint ≈ 4.5 GB (bf16).  10 checkpoints = ~45 GB.
# For a full pass@k sweep, aim for 10-20 evenly spaced points.
# With save_steps=2000 and max_steps=50000: 25 checkpoints saved, 10 kept.
log_steps: 10
save_steps: 500
save_total_limit: 5

# HuggingFace checkpoint upload (optional — uploads each checkpoint in background)
hf_upload_repo: Hula0401/cad_ckpt   # set to null to disable

# W&B
wandb_project: cadrille-rl
wandb_entity: null
wandb_offline: false
