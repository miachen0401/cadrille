# Cadrille RL fine-tuning — single A100 80 GB (SXM4 or PCIe)
# Full official hyperparameters — same as H100 80 GB (identical VRAM).
# See configs/rl/a100.yaml for the A100 40 GB (Colab Pro) reduced-memory variant.
#
# Memory breakdown (~55 GB):
#   Model weights (bf16):      ~4.5 GB
#   AdamW fp32 optimizer:      ~9.0 GB
#   Activations (G=16 batch):  ~30 GB
#
# Throughput vs H100:
#   H100:     ~8–12 steps/min → 50k steps in ~3–4 days
#   A100 80G: ~5–8  steps/min → 50k steps in ~4–6 days
#
# Usage: python rl/train.py --config configs/rl/a100-80gb.yaml

checkpoints_dir: ./checkpoints

mode: cppo
# base_model: /content/models/Qwen2-VL-2B-Instruct  # set on Colab to avoid HF rate limits
checkpoint_path: ./checkpoints/cadrille-sft

# Data
train_modality: img      # paper default: image input for RL
data_dir: null
hard_examples_pkl: ./data/mined/combined_hard.pkl
dpo_dataset: null

# Training (official hyperparameters)
max_steps: 50000
lr: 1.0e-5                    # scaled for hard_examples_pkl batch (same as 4080/h100)

# Dr. CPPO — full paper settings (G=16 fits in 80 GB)
G: 16
top_N: 4
eps_high: 0.1
eps_low: 0.1
entropy_coef: 0.01       # entropy bonus coefficient (loss -= entropy_coef * entropy); counters lazy-code collapse
batch_updates: 3
max_new_tokens: 1024
rollout_temperature: 0.3    # sampling temp; chosen by temp sweep (best pass@4 on SFT)
reward_workers: 8
eval_workers: 2           # Fix 5: pool workers for eval (separate from reward_workers)
eval_timeout: 120.0        # Fix 1: long timeout for eval subprocess (vs 30s for training)
sequential_generation: false  # G=16 batched fits in 80 GB

# DPO (unused in default run)
beta: 0.3
dpo_epochs_per_round: 10

# Validation — 100 DeepCAD + 100 Fusion360, pc + img
val_deepcad_dir:       ./data/deepcad_test_mesh
val_fusion360_dir:     ./data/fusion360_test_mesh
val_samples_deepcad:   100
val_samples_fusion360: 100
val_modalities:        pc,img
eval_steps: 500

# Logging & checkpoints
log_steps: 50
save_steps: 1000
save_total_limit: 10

# W&B
wandb_project: cadrille-rl
wandb_entity: null
wandb_offline: false
