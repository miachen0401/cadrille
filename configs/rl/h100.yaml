# Cadrille RL fine-tuning — single H100 (80 GB)
# Full official hyperparameters — no memory reduction needed.
#
# Memory breakdown (~55 GB):
#   Model weights (bf16):      ~4.5 GB
#   Adam fp32 optimizer:       ~9.0 GB
#   Activations (G=16 batch):  ~30 GB
#   Old policy (CPU-offloaded): 0 GB GPU
#
# Usage: python rl/train.py --config configs/rl/h100.yaml

checkpoints_dir: ./checkpoints

mode: cppo
# base_model: /content/models/Qwen2-VL-2B-Instruct  # set on Colab to avoid HF rate limits
checkpoint_path: ./checkpoints/cadrille-sft

# Data
data_dir: ./data/deepcad_test_mesh
hard_examples_pkl: null
dpo_dataset: null

# Training (official hyperparameters)
max_steps: 50000
lr: 3.0e-5

# Dr. CPPO official settings
G: 16
top_N: 4
eps_high: 0.1
eps_low: 0.1
batch_updates: 3
K_update: 10
max_new_tokens: 400
reward_workers: 8
sequential_generation: false  # G=16 in one batched generate call; fits in 80 GB easily

# DPO (unused)
beta: 0.3
dpo_epochs_per_round: 10

# Validation — 50 DeepCAD + 50 Fusion360, pc only (~5 min per eval pass on H100)
# 100+100 with pc+img = 400 sequential inference calls ≈ 2-3 h per pass; not useful.
# pc-only at 50+50 = 100 calls ≈ 5-10 min per pass. Increase after confirming rewards.
val_deepcad_dir:       ./data/deepcad_test_mesh
val_fusion360_dir:     ./data/fusion360_test_mesh
val_samples_deepcad:   50
val_samples_fusion360: 50
val_modalities:        pc
eval_steps: 500

# Logging & checkpoints
log_steps: 50
save_steps: 500    # save frequently — Colab H100 sessions can timeout after ~12h

# W&B
wandb_project: cadrille-rl
wandb_entity: null
wandb_offline: false
