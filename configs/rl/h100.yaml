# Cadrille RL fine-tuning — single H100 / A100 80 GB
# Official hyperparameters (Table 11, Cadrille paper): G=16, N=4, lr=3e-5,
# K_updates=3, eps=0.1, optimizer=AdamW (weight_decay=0.01).
#
# Memory breakdown (~72 GB with gradient checkpointing):
#   Model weights (bf16):                ~4.5 GB
#   AdamW fp32 optimizer states:         ~9.0 GB
#   Generation KV cache (G=16, seq=1):  ~20 GB
#   Backward activations (N=4 seqs):    ~28 GB  (gradient checkpointing halves this)
#   Buffers / fragmentation headroom:    ~10 GB
#   (No reference model — Dr. GRPO design saves ~4.5 GB)
#
# Usage: python rl/train.py --config configs/rl/h100.yaml
#
# Colab: update checkpoint_path and data paths below before running.

checkpoints_dir: ./checkpoints

mode: cppo
# base_model: /content/models/Qwen2-VL-2B-Instruct  # set on Colab to avoid HF rate limits
# Colab: set checkpoint_path to your SFT checkpoint path, e.g.:
#   checkpoint_path: /content/models/cadrille-sft
checkpoint_path: ./checkpoints/cadrille-sft

# Data — update paths for Colab (e.g. /content/data/deepcad_test_mesh)
data_dir: ./data/deepcad_test_mesh
hard_examples_pkl: null
dpo_dataset: null

# Training (official hyperparameters — Table 11)
max_steps: 50000
lr: 3.0e-5

# Dr. CPPO official settings
G: 16
top_N: 4
eps_high: 0.1
eps_low: 0.1
batch_updates: 3
batch_size: 4                 # 1 prompt × G=16 rollouts; batch_size>1 causes OOM at 80 GB
max_new_tokens: 600           # 600 tokens covers most CadQuery scripts; increase to 1024
                              # if the model truncates long outputs
reward_workers: 8
use_buffer: true
buffer_sample_size: 1
buffer_expand_frac: 0.5
buffer_max_size: 4096
eval_workers: 2
eval_timeout: 120.0
sequential_generation: false  # G=16 batched generation fits in 80 GB with batch_size=1

# DPO (unused)
beta: 0.3
dpo_epochs_per_round: 10

# Validation — 50 DeepCAD + 50 Fusion360, pc only (~5-10 min per pass on H100)
# Update paths for Colab. Set val_fusion360_dir: null if data unavailable.
val_deepcad_dir:       ./data/deepcad_test_mesh
val_fusion360_dir:     ./data/fusion360_test_mesh
val_samples_deepcad:   50
val_samples_fusion360: 50
val_modalities:        pc
eval_steps: 500

# Logging & checkpoints
# save_steps=500  → checkpoint every ~1 h on A100 80G; safe for Colab session timeouts.
# save_total_limit=10: 10 × 4.5 GB ≈ 45 GB on Drive. Increase if Drive has space.
log_steps: 10
save_steps: 300
save_total_limit: 10

# W&B
wandb_project: cadrille-rl
wandb_entity: null
wandb_offline: false
