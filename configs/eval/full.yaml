# Full test-set eval — all samples, img+pc, deepcad + fusion360.
# Tuned for H100 (80 GB). ~2-4h depending on n_checkpoints.
#
# Usage:
#   python3 -m eval.runner configs/eval/full.yaml

tag: full

checkpoints:
  - path: checkpoints/cadrille-sft
    label: "SFT"
  - path: checkpoints/cadrille-rl
    label: "RL-official"

datasets:
  deepcad:
    path: data/deepcad_test_mesh
    n_samples: null         # full test set (8046 STLs)
  fusion360:
    path: data/fusion360_test_mesh
    n_samples: null         # full test set (1725 STLs)

modalities: [img, pc]
max_new_tokens: 768
base_model: Qwen/Qwen2-VL-2B-Instruct

resources:                  # H100 settings
  batch_size_img: 32
  batch_size_pc: 64
  score_workers: 8
  prep_threads_img: 2
  prep_threads_pc: 8
  queue_size: 64
  save_code: true
  save_stl: true

pass_k:
  enabled: false            # too slow on full set; use compare.yaml instead
  k: [1, 5, 10]
  n_samples: 16
  temperature: 0.8
  iou_threshold: 0.95

render:
  enabled: true
  n: 20
  strategy: failures
  comparison_grid: true
  comparison_grid_n: 50
  comparison_grid_cols: 5

out_dir: eval_outputs
