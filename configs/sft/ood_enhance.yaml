# Cadrille SFT v4-holdout — v4 + 10-family holdout for OOD generalization study.
#
# vs v4:
#   * benchcad → benchcad/train_v4_holdout.pkl (10101 items, was 11443)
#   * cad_iso_106 → cad-iso-106/train_v4_holdout.pkl (108797 items, was 122483)
#   * Removes 15205 items belonging to 10 holdout families:
#       tapered_boss, taper_pin, venturi_tube, bucket, dome_cap, nozzle,
#       enclosure, waffle_plate, bolt, duct_elbow
#   * benchcad-easy is DISJOINT from holdout taxonomy (simple_* families) —
#     no filter needed.
#   * Mix shifted from v4's natural 50/50 → 60% HQ / 40% bench-stack per
#     user policy (more text2cad + recode_bench weight).
#
# Item counts (post-holdout):
#   benchcad             10 101
#   cad_iso_106         108 797
#   benchcad_simple      76 671
#   benchcad_easy        79 737  (40 of 55 shards: rows 30k–110k)
#   text2cad_bench_img   53 315
#   text2cad_bench_text  53 315
#   recode_bench        472 244
#   ─────────────────────────────
#   total               854 180
#
# Mix design — 60% HQ / 40% bench-stack:
#   per-source step share (weights sum to 1000 ≈ 1.0):
#     benchcad              1.5%   (~3.0 epochs/item)
#     cad_iso_106          15.8%   (~3.0 epochs/item)
#     benchcad_simple      11.1%   (~3.0 epochs/item)
#     benchcad_easy        11.6%   (~3.0 epochs/item)
#     text2cad_bench_img    5.5%   (~1.6 epochs/item, image)
#     text2cad_bench_text   5.5%   (~1.6 epochs/item, text)
#     recode_bench         49.0%   (~1.6 epochs/item)
#   bench-stack: 40.0%, HQ: 60.0% — natural shift from v4's 50/50.
#
# Eval design — 4 buckets at 50 cases each:
#   1. BC val IID (BenchCAD val, family NOT in holdout) — 1597 → sample 50
#   2. BC val OOD (BenchCAD val, family IN holdout)     — 177  → sample 50
#                                                          (5 cases × 10 fams)
#   3. DeepCAD test                                     — 50 cases
#   4. Fusion360 test                                   — 50 cases
#
#   recode20k probe DROPPED (too noisy; not informative).
#   IoU/recall/exec + op_entropy + rare_recall + n_distinct_rare per bucket.
#   essential_pass + feature_f1 on BC IID + OOD only (Cadance taxonomy).
#   Same metrics on max@8 every other eval.
#
# Expected results (paper Table B):
#   - greedy: BC IID > BC OOD (size of gap = "memorization tax")
#   - DC/Fu test should be UNAFFECTED (their families aren't in holdout)
#   - rare_recall on OOD bucket = key generalization signal
#   - essential_pass on OOD = does model reach for the right ops on
#     unseen-but-related shapes?

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true                    # required to load text2cad_bench_text

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

# Schedule — same as v3/v4 (50k steps, A100 ~25h)
max_steps: 50000
batch_size: 8
accumulation_steps: 4             # eff batch = 32
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 2000                  # 25 ckpts; save_total_limit=4 keeps last 4
eval_steps: 1000                  # 50 evals over 50k; max_iou@8 every 2nd
online_eval_n_per: 50             # σ ~3 IoU pts at n=50
max_iou_k: 8
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: true
resume_from_checkpoint: null      # FROM SCRATCH
run_name: null                    # auto-generate

seed: 42
max_code_len: 1000

# v4-holdout mix — 60% HQ / 40% bench-stack
sft_mix_weights:
  benchcad:             15
  cad_iso_106:         158
  benchcad_simple:     111
  benchcad_easy:       116
  text2cad_bench_img:   55
  text2cad_bench_text:  55
  recode_bench:        490
# total weight = 1000

# Holdout families — train.py filters benchcad/cad_iso_106 by these.
# Used by online_eval to build BC val OOD bucket (stratified 5 per family).
holdout_families:
  - tapered_boss
  - taper_pin
  - venturi_tube
  - bucket
  - dome_cap
  - nozzle
  - enclosure
  - waffle_plate
  - bolt
  - duct_elbow

# Use the holdout-filtered pkl files. train.py wires these via convention:
#   if a holdout pkl exists, load it instead of the default train.pkl.
benchcad_train_pkl: train_v4_holdout.pkl
cad_iso_106_train_pkl: train_v4_holdout.pkl

curriculum_phases: null

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-v4-holdout-50k
hf_upload_private: false

wandb_project: cadrille-sft
