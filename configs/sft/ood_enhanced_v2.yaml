# §7 v2 — ood_enhanced: bench-stack EXCL bench-simple, 10 v1 mech IN train.
#
# §7 role (2 → enhance): the v1 ood config (10 mech held out, no bench-easy,
# bench-simple in mix) renamed/repositioned. Vs ood_v2 the only difference
# is the 10 mech families are added back to bench/iso training pool —
# tests whether having more in-domain mechanical context helps the model
# generalize to the atomic op patterns held out as OOD.
#
# Total mix weight: 1000, HQ 60 / bench-stack 40.
# Bench/iso use the FULL train.pkl (no holdout filter).

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

max_steps: 50000
batch_size: 8
accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 2000
eval_steps: 1000
online_eval_n_per: 50
max_iou_k: 16
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: true
resume_from_checkpoint: null
run_name: null

seed: 42
max_code_len: 1000

# bench-stack distribution within 400 weight, proportional to row count:
#   benchcad (FULL 11k incl 10 mech)      : ~11/133 × 400 = 33
#   cad_iso_106 (FULL 122k incl 10 mech)  : ~122/133 × 400 = 367
#   benchcad-simple (held out entirely)   : 0
sft_mix_weights:
  benchcad:             33
  cad_iso_106:         367
  benchcad_simple:       0
  benchcad_easy:         0
  text2cad_bench_img:   55
  text2cad_bench_text:  55
  recode_bench:        490
# total = 1000

# No v1 mech holdout (10 mech are IN train).
# v2 holdout — bench-simple op patterns. Drives the OOD eval bucket.
holdout_families_v2:
  - simple_revolve
  - simple_loft
  - simple_polygon_cut
  - simple_extrude_hole
  - simple_box_hole_fillet
  - simple_cyl_cut
  - simple_revolve_cut
  - simple_extrude_hole_fillet
  - simple_loft_cut
  - simple_taper_extrude_chamfer

# Use full train.pkl for bench/iso so 10 mech are present.
benchcad_simple_train_pkl: train_v2_holdout.pkl

curriculum_phases: null

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-ood-enhanced-v2-50k
hf_upload_private: false

wandb_project: cadrille-sft

# v2 ablation: cap unique training rows to 500k across all sources.
# Subsamples each source proportionally to its mix weight, deterministic
# seed=42. Controls for "data volume" being a confound across the 5 lines —
# baseline_v2 has 578k HQ available, ood_enhanced_v2 has ~700k bench+HQ
# available; capping equalises the pool-size axis.
# Set to null to disable (use full source sizes).
total_train_dp: 500000
