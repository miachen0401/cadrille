# Cadrille SFT iid — full-data control (no training-side family holdout).
#
# Role in §7 4-line plot: the IID upper-bound. Holdout families are SEEN
# during training, so the OOD eval bucket measures in-domain ceiling rather
# than family transfer. Pairs with ood/ood_enhance to size the gap.
#
# vs ood_enhance:
#   * benchcad_train_pkl: REMOVED → uses default train.pkl (11443 items)
#   * cad_iso_106_train_pkl: REMOVED → uses default train.pkl (122483 items)
#   * holdout_families: KEPT (eval-only — used to bucket BC val into IID/OOD,
#     NOT to filter training data because no benchcad_train_pkl override)
#   * Mix weights stay the same (60/40 HQ/bench-stack).
#
# Eval: SAME 4 buckets as ood_enhance — and the BC val OOD bucket here
# measures IN-DOMAIN performance on those families (since they were SEEN
# in train). Diff vs ood_enhance OOD = generalization gap from holdout.

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

max_steps: 50000
batch_size: 8
accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 2000
eval_steps: 1000
online_eval_n_per: 50
max_iou_k: 8
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: true
resume_from_checkpoint: null
run_name: null

seed: 42
max_code_len: 1000

# Same 60/40 mix as v4-holdout — but item counts here are slightly higher
# (no holdout removed): benchcad 11443, cad_iso_106 122483 → bench-stack
# 290.3k vs holdout's 275.3k. Step share differs by <2pp; for a clean
# comparison we pin the same weight numbers.
sft_mix_weights:
  benchcad:             15
  cad_iso_106:         158
  benchcad_simple:     111
  benchcad_easy:       116
  text2cad_bench_img:   55
  text2cad_bench_text:  55
  recode_bench:        490

# Eval-only: train.py threads this into online_eval.set_holdout_families().
# benchcad_train_pkl is NOT set → train uses full train.pkl, so families
# below ARE seen during training. The OOD eval bucket then measures IID
# ceiling for the §7 figure.
holdout_families:
  - tapered_boss
  - taper_pin
  - venturi_tube
  - bucket
  - dome_cap
  - nozzle
  - enclosure
  - waffle_plate
  - bolt
  - duct_elbow

curriculum_phases: null

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-iid-50k
hf_upload_private: false

wandb_project: cadrille-sft
