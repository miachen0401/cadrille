# Cadrille SFT — BenchCAD + cad-recode-bench (100k) + text2cad-bench (90k) mix.
#
# After T8 (BenchCAD-style rewrite + 100k scale-up), recode/text2cad sources
# are now in the same code style as benchcad. This config exercises the new
# bench variants. Old recode20k / text2cad (compact recode style) are off.
#
# Dataset sizes (approx, after 95/5 hash split for recode-bench):
#   benchcad:        train ~18k + val ~2k          (existing)
#   recode-bench:    train ~95k + val ~5k          (T8 Phase A 20k + Phase B 80k)
#   text2cad-bench:  train ~76k + val ~6k + test ~8k (T8 Phase C, code rewritten)
#
# Total train ≈ 189k. At eff batch 30 → ~6300 steps per epoch. With max_steps
# 8000, that's ~1.27 epochs — pushing the data volume thesis (T8 goal).
#
# Mix weights tuned to bench-shape: benchcad gets 2× to bias toward its
# distinctive ops (hole/fillet/chamfer/revolve/faces_sel which recode/text2cad
# can't produce), recode-bench gets 2× for raw scale, text2cad-bench gets 1×
# for the no-image text→code modality.

checkpoints_dir: ./checkpoints

data_path: ./data
mode: img
use_text: true

# Training — same paper-exact knobs as mix_bc_r20k.yaml; max_steps doubled
# for the larger mix.
max_steps: 8000
batch_size: 15
accumulation_steps: 2
learning_rate: 2.0e-4
warmup_steps: 1500
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: false
dataloader_workers: 4

log_steps: 20
save_steps: 1000
eval_steps: 500
eval_on_start: true

resume_from_checkpoint: latest

seed: 42
max_code_len: 1000

# Mix: bench variants only. Old compact-style recode20k + text2cad off.
sft_mix_weights:
  recode:         0
  recode20k:      0
  text2cad:       0
  benchcad:       2
  recode_bench:   2
  text2cad_bench: 1

wandb_project: cadrille-sft
