# Cadrille SFT — big BenchCAD-shell mix, 50k steps
#
# Mix = 5 sources of BenchCAD-shell style training data, total ~478k items.
# Designed to fix two failure modes seen in the curriculum + resume runs:
#   1. `transformed` op under-predicted by 15% (fix: 4× more BC-shell exposure)
#   2. `fillet` op recall stuck at 0% (fix: cad-iso-106 has 19% fillet items)
#
# Per-source contribution (weight × items):
#   benchcad train:    4 × 18k  =  72k → 28.6% per step  (chamfer 15%, mech parts)
#   cad-iso-106:       4 × 170k = 680k → 28.6% per step  (fillet 19% ⭐ unique source)
#   benchcad-simple:   3 × 99k  = 297k → 21.4% per step  (arc 100%, simple ops)
#   cad-recode-bench:  2 × 100k = 200k → 14.3% per step  (paper geometry in BC style)
#   text2cad-bench:    1 × 90k  =  90k →  7.1% per step  (text modality, BC style)
#
# Per-item epochs over 50k steps × eff_bs 32 = 1.6M samples drawn:
#   benchcad train:    25 epochs (heavy, but rare-op coverage justified)
#   cad-iso-106:       2.7 epochs
#   benchcad-simple:   3.5 epochs
#   cad-recode-bench:  2.3 epochs
#   text2cad-bench:    1.3 epochs
#
# vs curriculum (which only had 18k benchcad + 18k recode + 25k text2cad = 61k items):
#   - data scale: 8× more
#   - BC-shell exposure: 0% → 100% (curriculum had 0% BC-shell, only raw recode + benchcad)
#   - fillet/chamfer training data: 9× more
#
# Expected end-state IoU (estimated from 100-case curriculum baseline + extrapolation):
#   BenchCAD val:   0.638 → 0.70-0.78  (+0.06-0.14 from BC-shell saturation)
#   DeepCAD test:   0.592 → 0.65-0.72  (+0.06-0.13 from cad-recode-bench geometry)
#   Fusion360 test: 0.469 → 0.55-0.65  (+0.08-0.18 from broader BC coverage)

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true                    # ← needed for text2cad-bench (text-only modality)

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

# Schedule — A100 ~25-30h
max_steps: 50000
batch_size: 8
accumulation_steps: 4             # eff batch = 32
learning_rate: 2.0e-4
warmup_steps: 2000                # 4% of 50k
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

# Logging — denser early, sparser later for big run
log_steps: 100
save_steps: 2500                  # 20 ckpts total; save_total_limit=4 → last 4 kept on disk
eval_steps: 2500
online_eval_n_per: 20
max_iou_k: 8
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: true
resume_from_checkpoint: null

seed: 42
max_code_len: 1000

# Mix per design above (confirmed by op-distribution analysis 2026-04-27)
sft_mix_weights:
  benchcad:         4
  cad_iso_106:      4
  benchcad_simple:  3
  recode_bench:     2
  text2cad_bench:   1

curriculum_phases: null

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-big-bench-shell-50k
hf_upload_private: false

wandb_project: cadrille-sft
