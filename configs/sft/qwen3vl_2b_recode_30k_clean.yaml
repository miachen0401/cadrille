# Cadrille SFT — Qwen3-VL-2B,纯 img,paper-style 长训(100k 步)
#
# 设计意图(路径 2):
#   - 留 Qwen3-VL-2B(用户选择,不回滚 Qwen2-VL)
#   - 不加 PC 模态(用户选择,不动 deepstack 兼容)
#   - 数据/步数/mix 是这次唯一动的 lever:
#       * 删 text2cad(在我们 curriculum 实验里 step 1000 就饱和,recall=1.0,
#         op_loss=0;留着只稀释 cad-recode + benchcad signal)
#       * 删 curriculum_phases(实测 phase 3 的 8:1:1 反而把 BenchCAD val IoU
#         从 step 14000 拉到了 step 16000 的 0.523)
#       * benchcad:cad-recode = 1:9(paper-style 接近纯 cad-recode,但保留
#         少量 benchcad 喂 fillet/chamfer/shell 等 rare ops)
#       * max_steps 20k → 100k(5×,跟 cadrille / CAD-Recode paper 对齐)
#
# 预期(估,跟当前 step 16000 比):
#   DeepCAD test     0.477 → 0.55-0.65 (+0.07-0.17)
#   Fusion360 test   0.556 → 0.60-0.70 (+0.05-0.15)
#   BenchCAD val     0.523 → 0.55-0.65 (+0.03-0.13)
#   离 0.80 目标差距:仍剩 0.15-0.25(预期还到不了,但能先确认「数据 + 步数」
#   这条线的天花板,再决定是否上 Option B 全量 1M data prep)
#
# Option B 升级路径(若 Option A 后仍 <0.7,且需要再上一档):
#   1. uv run python -m data_prep.fetch_cadrecode_full     # 写一个 fetcher
#      → 拉 filapro/cad-recode-v1.5 全量 .py(~500 MB)
#      → cadquery exec 每个 .py → STL(~30-50h, 12 核 multiprocessing)
#      → 4-view 预渲 PNG(~30h)
#      → 写 data/cad-recode-v1.5/train.pkl manifest
#      磁盘占用:~50 GB (STL) + ~30 GB (PNG)。/ephemeral 738 GB 够。
#   2. 把本 config 的 sft_mix_weights 里的 recode20k 换成 recode(全量)
#   3. 重跑同 100k 步 → 数据扩 50× 到位

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: false                   # ← 关键:删 text2cad

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

# Schedule — A100 8h 预算的 budget-fit。详细预算计算:
#   training: 14000 steps × 1.59 s/step = 22260 s = 6.18h
#   eval:     7 evals × 5 min            = 35 min
#   save:     7 saves × 1 min            = 7 min
#   总:                                   ≈ 6.85h(给 T8 + setup 留 1.15h)
# 14k 也碰巧对齐 curriculum 的 step 14000 eval 点(BenchCAD 0.529, DeepCAD 0.440,
# Fusion 0.551),做 apples-to-apples 时直接 step-vs-step 对比。
# 20k steps × eff_bs 32 = 448k samples drawn → 90% recode = 403k / 100k = 4 epochs
# over recode-v1.5(健康,比 curriculum 当时的 18k × 4 epoch 同体量,但数据更多样)。
max_steps: 14000                  # apples-to-apples vs curriculum step-14k 数据点
batch_size: 8
accumulation_steps: 4             # eff batch = 32
learning_rate: 2.0e-4
warmup_steps: 700                 # 5% of 14k
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

# Logging — 30k 步,跟 curriculum run 同密度方便对比
log_steps: 50
save_steps: 2000                  # 15 个 ckpt;save_total_limit=4
eval_steps: 2000                  # eval 每 ~25min on A100
online_eval_n_per: 20
max_iou_k: 8
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: true
resume_from_checkpoint: null

seed: 42
max_code_len: 1000

# Mix:近 paper 风格(纯 cad-recode 主导 + 极少 benchcad 喂 rare ops)
# `recode` 源 = filapro/cad-recode-v1.5 的 100k 子集(本 session 现渲);
# 路径 data/cad-recode-v1.5 → /ephemeral/data/cad-recode-v1.5(symlink)。
# train.py 现在按 pkl schema 自动选 loader:img-only(我们这版)→ CadRecode20kDataset。
sft_mix_weights:
  benchcad: 1                     # ~10% 抽样概率
  recode: 9                       # ~90% 抽样概率(100k items vs 旧 20k 子集)

# 显式不要 curriculum(static mix 全程不变)
curriculum_phases: null

save_only_model: false            # 留 optimizer state 以便 resume
save_total_limit: 4

# HF upload(public)
hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-recode-100k
hf_upload_private: false

wandb_project: cadrille-sft
