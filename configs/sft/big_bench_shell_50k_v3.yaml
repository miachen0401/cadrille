# Cadrille SFT v3 — 50k steps, fully cleaned 5-source mix, FROM SCRATCH.
#
# vs v2 (phase2 / current):
#   * text2cad_legacy entirely deleted (low-quality, 28 % trivial codes)
#   * Apply 80 % drop on DROP-flagged items (keep 20 % for diversity coverage)
#   * Apply code-hash dedup (huge win: benchcad 37 % dupes, iso 24 %, t2c 29 %)
#   * Refetched cad-recode-bench (now 472 k after filter, was 343 k pre-refetch)
#   * text2cad-bench enabled in BOTH image and text modes (separate weights):
#       - text2cad_bench_img: png_path → code (image-conditioned)
#       - text2cad_bench_text: description → code (text-conditioned)
#     Each modality is its own dataset entry; per-item is sampled in exactly
#     one mode per training step (no img+text mixed on same sample).
#
# Filtered item counts (verified 2026-04-28 after apply_data_filter):
#
#   source                  filtered      mode
#   ------------------------------------------------------
#   benchcad                  11 443      image
#   cad_iso_106              122 483      image
#   benchcad_simple           76 671      image
#   text2cad_bench_img        53 339      image
#   text2cad_bench_text       53 339      text
#   recode_bench             472 244      image
#   ------------------------------------------------------
#   total                    789 519
#
# Mix design: 60 % HQ share (text2cad_bench_img + text2cad_bench_text + recode_bench),
# 40 % bench-stack. Equal-per-item within each group.
#
#   per-source step share (total weight = 525):
#     benchcad              2.1 %    (~3.0 epochs per item)
#     cad_iso_106          23.2 %    (~3.0 epochs per item)
#     benchcad_simple      14.7 %    (~3.0 epochs per item)
#     text2cad_bench_img    5.5 %    (~1.65 epochs per item, image)
#     text2cad_bench_text   5.5 %    (~1.65 epochs per item, text)
#     recode_bench         49.0 %    (~1.65 epochs per item)
#   HQ combined: 60.0 %, bench-stack: 40.0 %
#   per-item rate within HQ ≈ 0.55 × per-item rate within bench

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true                    # required to load text2cad_bench_text

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

# Schedule — 50 k steps from scratch, A100 ~25 h
max_steps: 50000
batch_size: 8
accumulation_steps: 4             # eff batch = 32
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 2000                  # 25 ckpts; save_total_limit=4 → last 4 on disk
eval_steps: 1000                  # 50 evals over 50k steps; max_iou@8 every 2nd
online_eval_n_per: 50             # n=50 cuts noise σ from ~5 IoU pts → ~3
max_iou_k: 8
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: true
resume_from_checkpoint: null      # FROM SCRATCH
run_name: null                    # auto-generate (timestamp-based)

seed: 42
max_code_len: 1000

# Cleaned mix — equal-per-item within group, 60 % HQ
sft_mix_weights:
  benchcad:             11
  cad_iso_106:         122
  benchcad_simple:      77
  text2cad_bench_img:   29
  text2cad_bench_text:  29
  recode_bench:        257
# total weight = 525

curriculum_phases: null

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-v3-clean-50k
hf_upload_private: false

wandb_project: cadrille-sft
