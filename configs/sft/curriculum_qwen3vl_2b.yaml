# Cadrille SFT — curriculum (easy → hard mix shift) on Qwen3-VL-2B.
#
# Combines T7.2's Qwen3-VL backbone swap with the curriculum schedule
# from `curriculum_easy_to_hard.yaml`. Qwen3-VL-2B converged on the
# text2cad path within 500 steps in the smoke run (rare_op_macro_recall
# 0 → 1.0, op_loss 1.0 → 0.03), so the schedule's first phase should
# cement op-vocabulary fast and the later phases push image-conditioned
# generation on benchcad without prompt-leak.
#
# Phase boundaries align (approximately) with epoch boundaries. With
# 113 k items, eff batch 32 → ~3500 steps/epoch.
# Boundaries 5k / 10k → ~epoch 1.5 / ~epoch 3.

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

max_steps: 20000
batch_size: 8
accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 1000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 1000
eval_steps: 1000
online_eval_n_per: 20

eval_on_start: true
resume_from_checkpoint: null

seed: 42
max_code_len: 1000

# Curriculum: text-heavy → balanced → benchcad-extreme
curriculum_phases:
  - at_step: 0
    sft_mix_weights:
      benchcad: 1
      recode20k: 2
      text2cad: 2
  - at_step: 5000
    sft_mix_weights:
      benchcad: 2
      recode20k: 1
      text2cad: 1
  - at_step: 10000
    sft_mix_weights:
      benchcad: 8
      recode20k: 1
      text2cad: 1

# Fallback static mix (used only if curriculum_phases is null)
sft_mix_weights:
  benchcad: 4
  recode20k: 1
  text2cad: 1

save_only_model: false
save_total_limit: 4

# HF private storage is currently full → disable upload. Local ckpts on
# /ephemeral are durable; flip to a public repo or upgrade quota later.
hf_upload_repo: null

wandb_project: cadrille-sft
