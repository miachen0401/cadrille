# §7 v2 — iid: bench + iso (FULL, no holdout). NO simple. NO easy.
#
# §7 role (1): IID upper bound. Sees full mechanical training data with
# zero holdout — model has maximum mech context. Compared to ood_v2 (same
# weights, same total) the only difference is bench/iso use full train.pkl
# instead of v4-mech-holdout. Quantifies "what does holding out 10 mech
# families cost us at the same data budget?"
#
# Total mix weight: 1000, HQ 60 / bench-stack 40.
# bench/iso use FULL train.pkl (no holdout filter).

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true
backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

max_steps: 50000
batch_size: 8
accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01
bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 2000
eval_steps: 1000
online_eval_n_per: 50
max_iou_k: 0  # disabled — saves ~3.7h/config (was 16)
eval_on_start: true

resume_from_checkpoint: null
run_name: null
seed: 42
max_code_len: 1500

# Pool target (cap at 300k, bench/iso FULL train.pkl):
#   bench: 10.0k   iso:  110.0k                    (ours = 100k cap → 100k)
#   t2c_img: 18.3k t2c_text: 18.3k recode: 163.4k  (HQ = 200k)
sft_mix_weights:
  benchcad:             28
  cad_iso_106:         306
  benchcad_simple:       0
  benchcad_easy:         0
  text2cad_bench_img:   61
  text2cad_bench_text:  61
  recode_bench:        544

# No mech holdout, no simple. bench/iso use full train.pkl.
curriculum_phases: null

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-iid-v2-50k
hf_upload_private: false
wandb_project: cadrille-sft
