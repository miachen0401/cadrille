# Cadrille SFT v4 — v3 + benchcad-easy (109k new items).
#
# vs v3:
#   * + benchcad_easy source (109,804 items, just rendered + uploaded to
#     Hula0401/cad-sft/benchcad-easy/ as 55 shards of 2000 rows each).
#   * Same `simple_*` family taxonomy as benchcad/benchcad-simple — adds
#     bench-style image diversity at 10× the size of benchcad.
#   * Bench-stack grew from 210k items (v3) → 320k items (v4): step share
#     auto-rebalances under equal-per-item-within-group.
#
# Total filtered items (estimated; actual after fetch + filter):
#   benchcad             11 443
#   cad_iso_106         122 483
#   benchcad_simple      76 671
#   benchcad_easy       109 804  ← NEW
#   text2cad_bench_img   53 339
#   text2cad_bench_text  53 339
#   recode_bench        472 244
#   ─────────────────────────────
#   total               899 323
#
# Mix design:
#   v3 had 60% HQ / 40% bench-stack with equal-per-item within group.
#   v4 keeps the same equal-per-item rule. With benchcad-easy added to the
#   bench-stack, the bench-stack item count grows 210k→320k, so its step
#   share auto-grows from 40%→~50% under the rule. HQ correspondingly drops
#   60%→50%.
#
#   per-source step share (total weight = 635):
#     benchcad              1.7%   (~3.0 epochs per item)
#     cad_iso_106          19.2%   (~3.0 epochs per item)
#     benchcad_simple      12.1%   (~3.0 epochs per item)
#     benchcad_easy        17.3%   (~3.0 epochs per item)  ← NEW
#     text2cad_bench_img    4.6%   (~1.36 epochs per item, image)
#     text2cad_bench_text   4.6%   (~1.36 epochs per item, text)
#     recode_bench         40.5%   (~1.36 epochs per item)
#   bench-stack: 50.3%, HQ: 49.7% — natural shift from v3's 40/60.
#
# Expected lift vs v3 best (max@8 BC=0.624 / DC=0.689 / Fu=0.696):
#   + benchcad-easy doubles bench image diversity → BC val +0.03-0.06
#   + bench-stack share growing should also lift DC/Fu modestly via
#     more "real CAD-style" image conditioning.
#   Aim: max@8 DC/Fu cross 0.75 by step 25-30k. If yes, RL becomes viable.

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true                    # required to load text2cad_bench_text

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

# Schedule — same as v3 (50 k steps, A100 ~25 h)
max_steps: 50000
batch_size: 8
accumulation_steps: 4             # eff batch = 32
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 2000                  # 25 ckpts; save_total_limit=4 → last 4 on disk
eval_steps: 1000                  # 50 evals over 50k steps; max_iou@8 every 2nd
online_eval_n_per: 50             # n=50 cuts noise σ ~5 IoU pts → ~3
max_iou_k: 8
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: true
resume_from_checkpoint: null      # FROM SCRATCH
run_name: null                    # auto-generate

seed: 42
max_code_len: 1000

# v4 mix — equal-per-item within group, bench-stack (50%) / HQ (50%)
sft_mix_weights:
  benchcad:             11
  cad_iso_106:         122
  benchcad_simple:      77
  benchcad_easy:       110         # NEW (~109,804 items, weight ∝ count/1k)
  text2cad_bench_img:   29
  text2cad_bench_text:  29
  recode_bench:        257
# total weight = 635

curriculum_phases: null

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-v4-easy-50k
hf_upload_private: false

wandb_project: cadrille-sft
