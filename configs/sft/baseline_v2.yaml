# §7 v2 — baseline (HQ only): no BenchCAD data at all.

#

# §7 role (4): floor — does HQ-only (text2cad + recode_bench) generalize

# to bench-simple op patterns? Hypothesis: ess_pass ≈ 0 throughout, even

# with HQ scaled up to total weight 1000.

#

# Total mix weight: 1000 (HQ proportions scaled from current 600 → 1000).

# All bench-stack sources are present in the loader but weighted 0

# (so the holdout filter has nothing to do).

checkpoints_dir: /ephemeral/checkpoints

data_path: ./data

mode: img

use_text: true

backbone: qwen3_vl

base_model: Qwen/Qwen3-VL-2B-Instruct

max_steps: 50000

batch_size: 8

accumulation_steps: 4

learning_rate: 2.0e-4

warmup_steps: 2000

lr_scheduler_type: cosine

weight_decay: 0.01

bf16: true

gradient_checkpointing: true

dataloader_workers: 4

group_by_length: true

log_steps: 50

save_steps: 2000

eval_steps: 1000

online_eval_n_per: 50

max_iou_k: 16

max_iou_temperature: 1.0

max_iou_every_n_evals: 2

eval_on_start: true

resume_from_checkpoint: null

run_name: null

seed: 42

max_code_len: 1500

total_train_dp: 300000

# Pool target (cap-only at 300k): all HQ.

#   t2c_img: 27.6k    t2c_text: 27.6k    recode: 244.8k

sft_mix_weights:

  benchcad:              0

  cad_iso_106:           0

  benchcad_simple:       0

  benchcad_easy:         0

  text2cad_bench_img:   92

  text2cad_bench_text:  92

  recode_bench:        816

curriculum_phases: null

save_only_model: false

save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-baseline-v2-50k

hf_upload_private: false

wandb_project: cadrille-sft
