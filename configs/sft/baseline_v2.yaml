# §7 v2 — baseline (HQ only): no BenchCAD data at all.
#
# §7 role (4): floor — does HQ-only (text2cad + recode_bench) generalize
# to bench-simple op patterns? Hypothesis: ess_pass ≈ 0 throughout, even
# with HQ scaled up to total weight 1000.
#
# Total mix weight: 1000 (HQ proportions scaled from current 600 → 1000).
# All bench-stack sources are present in the loader but weighted 0
# (so the holdout filter has nothing to do).

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

max_steps: 50000
batch_size: 8
accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 2000
eval_steps: 1000
online_eval_n_per: 50
max_iou_k: 16
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: true
resume_from_checkpoint: null
run_name: null

seed: 42
max_code_len: 1000

# HQ-only mix scaled to total=1000 (text2cad+recode current 55:55:490 = 600
# → here 92:92:816 = 1000 keeping the within-HQ ratio).
sft_mix_weights:
  benchcad:              0
  cad_iso_106:           0
  benchcad_simple:       0
  benchcad_easy:         0
  text2cad_bench_img:   92
  text2cad_bench_text:  92
  recode_bench:        816

# v2 holdout — bench-simple op patterns. Eval-side only here (training
# weight 0 means the holdout has no train effect; included for the
# online_eval bucket label).
holdout_families_v2:
  - simple_revolve
  - simple_loft
  - simple_polygon_cut
  - simple_extrude_hole
  - simple_box_hole_fillet
  - simple_cyl_cut
  - simple_revolve_cut
  - simple_extrude_hole_fillet
  - simple_loft_cut
  - simple_taper_extrude_chamfer

curriculum_phases: null

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-baseline-v2-50k
hf_upload_private: false

wandb_project: cadrille-sft

# v2 ablation: cap unique training rows to 500k across all sources.
# Subsamples each source proportionally to its mix weight, deterministic
# seed=42. Controls for "data volume" being a confound across the 5 lines —
# baseline_v2 has 578k HQ available, ood_enhanced_v2 has ~700k bench+HQ
# available; capping equalises the pool-size axis.
# Set to null to disable (use full source sizes).
total_train_dp: 500000
