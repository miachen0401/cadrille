# Cadrille SFT — full bench mix: BenchCAD + recode-bench + text2cad-bench +
#                                 benchcad-simple-100k.
#
# Adds Phase F's BenchCAD/cad_simple_ops_100k (~99k native bench-style code +
# 4-view PNG) on top of mix_bc_rb_t2cb.yaml. This is the data the recode/
# text2cad rewrite couldn't synthesize: hole/fillet/chamfer/revolve/cut/etc
# in their natural BenchCAD shell (no AST rewrite, no procedural recode bias).
#
# Dataset sizes (approx):
#   benchcad:          train ~18k + val ~2k             (BenchCAD/cad_bench)
#   recode-bench:      train ~95k + val ~5k             (T8 Phase A+B)
#   text2cad-bench:    train ~76k + val ~6k + test ~8k  (T8 Phase C)
#   benchcad-simple:   train ~94k + val ~5k             (T8 Phase F)
#
# Total train ≈ 283k (vs 189k in mix_bc_rb_t2cb). At eff batch 30 → ~9400
# steps per epoch. max_steps 12000 ≈ 1.27 epochs.
#
# Mix strategy: benchcad-simple gets 2× same as benchcad — both are native
# bench-style image+code; together they dominate the op-distribution which
# is the primary thesis of T8/F. recode-bench keeps 2× for raw scale but is
# now a minority. text2cad-bench at 1× as text-conditioned auxiliary signal.

checkpoints_dir: ./checkpoints

data_path: ./data
mode: img
use_text: true

max_steps: 12000
batch_size: 15
accumulation_steps: 2
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: false
dataloader_workers: 4

log_steps: 20
save_steps: 1000
eval_steps: 500
eval_on_start: true

resume_from_checkpoint: latest

seed: 42
max_code_len: 1000

# Mix: bench variants only. Old compact-style off.
sft_mix_weights:
  recode:           0
  recode20k:        0
  text2cad:         0
  benchcad:         2
  benchcad_simple:  2
  recode_bench:     2
  text2cad_bench:   1

wandb_project: cadrille-sft
