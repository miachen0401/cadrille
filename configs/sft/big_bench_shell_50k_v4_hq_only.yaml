# Cadrille SFT v4-hq-only — HQ-only ablation (no benchcad-style data).
#
# Comparison config #2 from user policy 2026-04-30:
#   "全部用不带我们数据的text2cad和recoder bench 跑" — train ONLY on
#   text2cad-bench + recode-bench, drop the entire bench-stack
#   (benchcad, cad_iso_106, benchcad_simple, benchcad_easy).
#
# Purpose: ablation showing whether our synthesized bench data (BenchCAD-shell-
# style) actually adds value vs just training on rewritten cad-recode +
# text2cad. If v4-holdout / v4-baseline beat this on BC val + DC + Fu, the
# bench-stack is justified. If gap is small, it questions the data effort.
#
# vs v4-holdout:
#   * sft_mix_weights ZEROES OUT bench-stack (benchcad, cad_iso_106,
#     benchcad_simple, benchcad_easy)
#   * Only HQ sources: text2cad_bench_img, text2cad_bench_text, recode_bench
#   * Total items: 53315+53315+472244 = 578,874 (vs 854k for v4-holdout).
#   * holdout_families STILL set so OOD eval bucket can be built — but the
#     holdout filter has no effect because we're not loading benchcad/iso
#     anyway (their weights are 0).
#
# Item counts:
#   text2cad_bench_img    53 315  (16% of stack)
#   text2cad_bench_text   53 315  (16%)
#   recode_bench         472 244  (68%)
#
# Mix design — equal-per-item across the 3 sources (count / 1000):
#   text2cad_bench_img    53
#   text2cad_bench_text   53
#   recode_bench         472
#   per-source step share:
#     text2cad_img    9.2%   (~1.36 epochs/item)
#     text2cad_text   9.2%   (~1.36 epochs/item)
#     recode_bench   81.6%   (~1.36 epochs/item)
#
# Eval: SAME 4 buckets (BC IID, BC OOD, DC test, Fu test). BC OOD bucket
# is informative here too — shows what HQ-only gets you on unseen families.

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

max_steps: 50000
batch_size: 8
accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 2000
eval_steps: 1000
online_eval_n_per: 50
max_iou_k: 8
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: true
resume_from_checkpoint: null
run_name: null

seed: 42
max_code_len: 1000

# HQ-only: zero out bench-stack, keep text2cad + recode_bench.
# The 0-weight sources still load (no efficient way to skip), but the
# WeightedRandomSampler will never sample from them.
sft_mix_weights:
  benchcad:              0
  cad_iso_106:           0
  benchcad_simple:       0
  benchcad_easy:         0
  text2cad_bench_img:   53
  text2cad_bench_text:  53
  recode_bench:        472

# Holdout still defined for eval-side OOD bucket construction (the bench
# loaders won't be in the mix anyway because their weight is 0).
holdout_families:
  - tapered_boss
  - taper_pin
  - venturi_tube
  - bucket
  - dome_cap
  - nozzle
  - enclosure
  - waffle_plate
  - bolt
  - duct_elbow

curriculum_phases: null

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-v4-hq-only-50k
hf_upload_private: false

wandb_project: cadrille-sft
