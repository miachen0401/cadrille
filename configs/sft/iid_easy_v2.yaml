# §7 v2 — iid_easy: HQ + benchcad-easy plate primitives ONLY (no other bench).
#
# §7 role (3): tests "does seeing plate primitives (extrude+fillet) transfer
# to op-pattern composition?" Hypothesis: marginal — plates are structurally
# distinct from atomic op patterns (no revolve/loft/sweep), so OOD ess_pass
# climbs slowly above baseline but stays well below ood_enhanced.
#
# Total mix weight: 1000 (HQ 600 + benchcad-easy 400). Same 60/40 ratio as
# the bench-stack v2 configs, just with `bench-stack` replaced by easy.

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

max_steps: 50000
batch_size: 8
accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 2000
eval_steps: 1000
online_eval_n_per: 50
max_iou_k: 16
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: true
resume_from_checkpoint: null
run_name: null

seed: 42
max_code_len: 1000

# HQ 600 (55+55+490) + benchcad-easy 400 = 1000. No bench, iso, simple,
# or text2cad-bench beyond HQ.
sft_mix_weights:
  benchcad:              0
  cad_iso_106:           0
  benchcad_simple:       0
  benchcad_easy:       400
  text2cad_bench_img:   55
  text2cad_bench_text:  55
  recode_bench:        490

holdout_families_v2:
  - simple_revolve
  - simple_loft
  - simple_polygon_cut
  - simple_extrude_hole
  - simple_box_hole_fillet
  - simple_cyl_cut
  - simple_revolve_cut
  - simple_extrude_hole_fillet
  - simple_loft_cut
  - simple_taper_extrude_chamfer

curriculum_phases: null

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-iid-easy-v2-50k
hf_upload_private: false

wandb_project: cadrille-sft
