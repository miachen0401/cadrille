# Resume the original ood_enhance run from ckpt-24000 → step 30000.
# Adds 6k steps to give RL a stronger SFT base while still cheap (~3.5h on A100).
#
# Diff vs ood_enhance.yaml (the parent):
#   * resume_from_checkpoint   → ckpt-24000 path
#   * max_steps                → 30000
#   * eval_on_start            → false (we already have step-24000 eval)
# Everything else (mix, holdout, mode, batch, lr, save_steps) is inherited
# verbatim from the run that produced ckpt-24000 — see run_config.yaml in
# the ckpt dir for the exact recipe snapshot.

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true

backbone: qwen3_vl
base_model: Qwen/Qwen3-VL-2B-Instruct

max_steps: 30000              # +6k from ckpt-24k
batch_size: 8
accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 2000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 2000              # → save 26k, 28k, 30k
eval_steps: 1000
online_eval_n_per: 50
max_iou_k: 16                 # bumped from 8 — needed for Q3 ckpt selection
max_iou_temperature: 1.0
max_iou_every_n_evals: 2

eval_on_start: false          # ckpt-24k already has eval landed
resume_from_checkpoint: /ephemeral/checkpoints/sft-s50k-lr2e-4-b8a4-img-0430-0828/checkpoint-24000
run_name: sft-s50k-lr2e-4-b8a4-img-0430-0828   # SAME run dir → ckpts land alongside 24k

seed: 42
max_code_len: 1000

sft_mix_weights:
  benchcad:             15
  cad_iso_106:         158
  benchcad_simple:     111
  benchcad_easy:       116
  text2cad_bench_img:   55
  text2cad_bench_text:  55
  recode_bench:        490

holdout_families:
  - tapered_boss
  - taper_pin
  - venturi_tube
  - bucket
  - dome_cap
  - nozzle
  - enclosure
  - waffle_plate
  - bolt
  - duct_elbow

benchcad_train_pkl: train_v4_holdout.pkl
cad_iso_106_train_pkl: train_v4_holdout.pkl

curriculum_phases: null

save_only_model: false
save_total_limit: 8           # keep 24k/26k/28k/30k around for the ckpt picker

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-v4-holdout-50k
hf_upload_private: false

wandb_project: cadrille-sft
