# Cadrille SFT — 100% BenchCAD, A100 80GB.
#
# Full run on all 18,167 benchcad train rows (recode/text2cad weights zero).
# 5000 steps @ bs=4 acc=2 = 10k effective samples × 2 modalities per epoch.
# Dataset size 18,167 means ~0.55 epochs per 5k steps; bump max_steps for more.

checkpoints_dir: ./checkpoints

data_path: ./data
mode: pc_img
use_text: false                     # text2cad loader off

# Training
max_steps: 5000
batch_size: 4
accumulation_steps: 2                # effective batch = 8
learning_rate: 2.0e-4                # matches default
warmup_steps: 500                    # ~10% of max_steps
lr_scheduler_type: cosine
weight_decay: 0.01

# A100 native bf16
bf16: true
gradient_checkpointing: false

dataloader_workers: 4

# Logging + checkpoints — keep disk usage bounded
log_steps: 20
save_steps: 2500                     # fewer saves; each is ~4 GB (save_only_model)
eval_steps: 500
eval_on_start: true

# Reproducibility
seed: 42
max_code_len: 1000

# Mix: benchcad only. Other sources loaded but weight 0.
sft_mix_weights:
  recode:   0
  text2cad: 0
  benchcad: 1

# W&B
wandb_project: cadrille-sft
