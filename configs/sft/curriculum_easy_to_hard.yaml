# Cadrille SFT — curriculum: easy → hard mix shift over training.
#
# Hypothesis-2 follow-up to mix_bc4_r20k_t2c.yaml (fixed 4:1:1) which kept
# rare_op_macro_recall at 0 across 20 k steps. The static benchcad-heavy
# mix didn't break the sketch+extrude basin because token-CE on long
# benchcad codes still got dominated by the simpler dialect's gradient
# mass.
#
# Curriculum approach: start with text2cad/recode20k-heavy so the model
# locks in clean cadquery syntax and the sketch dialect, THEN shift to
# benchcad-heavy in two steps to push op-level vocabulary (chamfer,
# revolve, fillet, hole, cut, transformed) without a cold start on rare ops.
#
# Phase boundaries align (approximately) with epoch boundaries. With
# 113 k items, eff batch 32 → ~3500 steps/epoch. Boundaries at 5k/10k
# land at ~epoch 1.5 / ~epoch 3, giving each phase ~1-2 epochs.

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true

base_model: ./checkpoints/sft-s10k-lr2e-4-b6a5-img-0424-2001/checkpoint-4000

max_steps: 20000
batch_size: 8
accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 1000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 50
save_steps: 1000
eval_steps: 1000
online_eval_n_per: 20

eval_on_start: true
resume_from_checkpoint: null

seed: 42
max_code_len: 1000

# === Curriculum mix schedule ===
# When set, this OVERRIDES sft_mix_weights below. First phase MUST start
# at step 0. Phase weights take effect at the next epoch boundary after
# the threshold step (HF Trainer rebuilds the dataloader iter per epoch).
curriculum_phases:
  - at_step: 0
    sft_mix_weights:
      benchcad: 1
      recode20k: 2
      text2cad: 2          # text-heavy: lock in sketch+extrude basics
  - at_step: 5000
    sft_mix_weights:
      benchcad: 2
      recode20k: 1
      text2cad: 1          # balance: start exposing op-level dialect
  - at_step: 10000
    sft_mix_weights:
      benchcad: 8
      recode20k: 1
      text2cad: 1          # benchcad-extreme: force op-level mastery

# Plain mix retained as a fallback / for static-mix runs without curriculum.
sft_mix_weights:
  benchcad: 4
  recode20k: 1
  text2cad: 1

save_only_model: false
save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-sft-curriculum-bc1to8-r20k1-t2c1
hf_upload_private: true

wandb_project: cadrille-sft
