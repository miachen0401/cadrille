# Cadrille SFT smoke on Qwen3-VL-2B-Instruct.
#
# Goal: verify end-to-end training loop runs on the Qwen3-VL backbone
# (img-only path, parent-deferred forward) before committing to a long
# benchcad-heavy comparison run vs Qwen2-VL-2B baseline.
#
# 500 steps with the 2:1:1 mix and a small batch — fits in ~30 min on A100,
# enough to see eval_loss + IoU + ops metrics evolve and confirm
# checkpoint save / HF upload work.

backbone: qwen3_vl

checkpoints_dir: /ephemeral/checkpoints
data_path: ./data
mode: img
use_text: true
base_model: Qwen/Qwen3-VL-2B-Instruct

max_steps: 500
batch_size: 4
accumulation_steps: 4         # eff batch = 16; halves per-step time vs full bs=8
learning_rate: 2.0e-4
warmup_steps: 100
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
dataloader_workers: 4
group_by_length: true

log_steps: 25
save_steps: 250                # 2 saves over 500 steps
eval_steps: 250                # 2 evals; 1 mid-run + 1 at end
online_eval_n_per: 10          # cheaper smoke
eval_on_start: true            # baseline at step 0 before any training

resume_from_checkpoint: null

seed: 42
max_code_len: 1000

# Same 2:1:1 mix as our prior baseline run for direct comparability
sft_mix_weights:
  recode:    0
  text2cad:  1
  benchcad:  2
  recode20k: 1

# Disk-tight smoke — keep weights only, single ckpt
save_only_model: true
save_total_limit: 1

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-smoke
hf_upload_private: false

wandb_project: cadrille-sft
