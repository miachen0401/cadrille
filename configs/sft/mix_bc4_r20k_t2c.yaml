# Cadrille SFT — Hypothesis 1: benchcad-heavy mix from ckpt-4000 warm start.
#
# docs/sft_diagnostics_2026-04-25.md found that the prior 2:1:1 ckpt-4000
# collapsed to the sketch+extrude dialect (from recode20k/text2cad) and
# completely failed to learn op-level operations from benchcad
# (hole/cut/chamfer/revolve/transformed all 0% in pred despite 8-44% GT
# rates).
#
# This run pushes benchcad to 67% of the sampler mass and starts from the
# prior weights so we don't relitigate the dialect collapse from scratch.
# Fresh lr cycle (no resume_from_checkpoint) so cosine peaks at step 1000
# instead of starting on the decay tail.

checkpoints_dir: /ephemeral/checkpoints   # /dev/vdb (738 GB), keep root-disk free
data_path: ./data
mode: img
use_text: true                # text2cad still pulled, just lower weight

# Cold-start from upstream Qwen2-VL-2B. Earlier versions of this config
# warm-started from `./checkpoints/sft-s10k-.../checkpoint-4000`, but that
# checkpoint was trained against a leaky BenchCAD prompt (description
# included `ops=[...]`) — see `common/datasets.py` BenchCadDataset fix.
# Reusing it would re-import the trivial-mapping behaviour we're trying
# to remove, so we restart from upstream weights.
backbone: qwen2_vl
base_model: Qwen/Qwen2-VL-2B-Instruct

# Training - bs=8 (user request), acc=4 -> eff batch = 32, near paper 30
max_steps: 20000              # ~5x previous; let benchcad-heavy mix work
batch_size: 8
accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 1000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: true  # bs=8 + img tokens still tight on 80 GB
dataloader_workers: 4
group_by_length: true         # ~20% throughput win on the mixed-length corpus

# Logging + checkpoints - sparser saves to stay under disk
log_steps: 50
save_steps: 1000              # save every 1k steps (synced with eval cadence)
eval_steps: 1000              # online IoU + eval_loss every 1k
# Keep optimizer + scheduler + RNG state for exact resume. Each ckpt ~13 GB
# (vs ~4 GB weights-only). save_total_limit=2 fits the disk after dropping
# the warm-start base_model dir post-boot. HF upload preserves history.
save_only_model: false
save_total_limit: 4              # /ephemeral has 700+ GB free — keep more
online_eval_n_per: 20         # items per dataset (BenchCAD/DeepCAD/Fusion360) for online IoU

eval_on_start: true
resume_from_checkpoint: null  # NOT a resume - base_model warm start instead

# Reproducibility
seed: 42
max_code_len: 1000

# Mix - benchcad-heavy. recode20k+text2cad stay in to keep the model from
# forgetting the sketch dialect entirely (we still want it for short prims).
sft_mix_weights:
  recode:    0
  text2cad:  1
  benchcad:  4
  recode20k: 1

# HF upload - non-blocking thread, training never pauses
hf_upload_repo: Hula0401/cadrille-sft-bc4-r20k1-t2c1-v2
hf_upload_private: true

wandb_project: cadrille-sft
