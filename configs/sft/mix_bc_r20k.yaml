# Cadrille SFT — BenchCAD + cad-recode-20k img mix, A100 80GB.
#
# Hyperparameters follow cadrille/configs/sft/a100.yaml (paper-exact):
#   bs=15, accumulation_steps=2  →  effective batch = 30
#   lr=2e-4 cosine, warmup 1000, weight_decay 0.01
#   bf16 (A100 native)
#
# Differences from a100.yaml:
#   - mode=img (not pc_img) — no STL in recode-20k, so pc is off the table
#   - img_size=268 — keep source resolution (all PNGs are native 268×268)
#     processor upsamples to min_pixels≈448×448 internally; starting from 268
#     preserves more info than the old 128 downsize
#   - max_steps=4000 — dataset ~37k items; at eff batch 30 that's ~3.25 epochs
#   - save_only_model=true — disk-constrained (~18 GB free); drops optimizer
#     state from ckpts so each is ~4 GB instead of ~13 GB. Resume from a
#     _model_ ckpt warns about optimizer mismatch but training continues.
#   - resume_from_checkpoint=latest — auto-resume from the newest checkpoint-<N>/
#     in output_dir; clean restart if no ckpt exists yet.

checkpoints_dir: ./checkpoints

data_path: ./data
mode: img
use_text: false

# Training — cadrille/configs/sft/a100.yaml values
max_steps: 4000
batch_size: 15
accumulation_steps: 2
learning_rate: 2.0e-4
warmup_steps: 1000
lr_scheduler_type: cosine
weight_decay: 0.01

bf16: true
gradient_checkpointing: false
dataloader_workers: 4

# Logging + checkpoints — tuned for 4k-step budget
log_steps: 20
save_steps: 1000
eval_steps: 500
eval_on_start: true

# Resume wiring — train.sft accepts 'latest' and picks newest checkpoint-<N>/
resume_from_checkpoint: latest

# Reproducibility
seed: 42
max_code_len: 1000

# Mix: benchcad + recode20k at 1:1. Old cad-recode-v1.5 and text2cad off.
sft_mix_weights:
  recode:    0
  text2cad:  0
  benchcad:  1
  recode20k: 1

wandb_project: cadrille-sft
