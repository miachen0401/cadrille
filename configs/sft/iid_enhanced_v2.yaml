# §7 v2 — iid_enhanced: bench + iso + benchcad-easy + HQ.

#

# §7 role (3): bench-stack augmented with plate primitives. Tests "does

# easy plate data on top of bench+iso help OOD op-pattern composition?"

# Pool = 100k bench-stack (4.1k bench + 45.9k iso + 50k easy) + 200k HQ.

checkpoints_dir: /ephemeral/checkpoints

data_path: ./data

mode: img

use_text: true

backbone: qwen3_vl

base_model: Qwen/Qwen3-VL-2B-Instruct

max_steps: 50000

batch_size: 8

accumulation_steps: 4

learning_rate: 2.0e-4

warmup_steps: 2000

lr_scheduler_type: cosine

weight_decay: 0.01

bf16: true

gradient_checkpointing: true

dataloader_workers: 4

group_by_length: true

log_steps: 50

save_steps: 2000

eval_steps: 1000

online_eval_n_per: 50

max_iou_k: 16

max_iou_temperature: 1.0

max_iou_every_n_evals: 2

eval_on_start: true

resume_from_checkpoint: null

run_name: null

seed: 42

max_code_len: 1500

total_train_dp: 300000

# Pool target (cap-only at 300k):

#   bench:  4.1k    iso:   45.9k   easy:    50.0k    (ours = 100k)

#   t2c_img: 18.3k  t2c_text: 18.3k recode: 163.4k   (HQ = 200k)

sft_mix_weights:

  benchcad:             14

  cad_iso_106:         153

  benchcad_simple:       0

  benchcad_easy:       167

  text2cad_bench_img:   61

  text2cad_bench_text:  61

  recode_bench:        544

curriculum_phases: null

save_only_model: false

save_total_limit: 4

hf_upload_repo: Hula0401/cadrille-qwen3vl-2b-iid-enhanced-v2-50k

hf_upload_private: false

wandb_project: cadrille-sft
